name: ADK Answering Agent for Discussions

on:
  discussion:
    types: [created]
  discussion_comment:
    types: [created]

permissions:
  contents: read

jobs:
  agent-answer-questions:
    if: >-
      (github.event_name == 'discussion' && github.event.discussion.category.name == 'Q&A') ||
      (github.event_name == 'discussion_comment' && github.event.discussion.category.name == 'Q&A')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Run Answering Script
        env:
          OWNER: 'google'
          REPO: 'adk-java'
          GEMINI_API_KEY: ${{}}
        run: |
          cat > /tmp/discussion.json << 'EOF'
          ${{ toJson(github.event.discussion) }}
          EOF
          ./gradlew run --args="/tmp/discussion.json"
